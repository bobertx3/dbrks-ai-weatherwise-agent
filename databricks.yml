bundle:
  name: weatherwise-agent-demo

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/weatherwise-agent-demo

variables:
  serving_endpoint_name:
    description: "Name of the model serving endpoint for the weatherwise agent"
    default: "agents_bx4-agentbricks_weatherwise-weatherwise"
  sql_warehouse_id:
    description: "SQL warehouse ID for the dashboard and Genie features"
    default: "0d3bda4f46281ab5"
  resource_name_suffix:
    description: "Suffix for resource names to avoid collisions"

resources:
  apps:
    weatherwise_chatapp:
      name: weatherwise-chat-agent
      description: "WeatherWise Supply Chain Agent Chat Application"
      source_code_path: ./chatapp
      resources:
        - name: serving-endpoint
          description: "Databricks serving endpoint for the weatherwise agent"
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY
        - name: sql-warehouse
          description: "SQL warehouse for dashboard queries and Genie"
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        # Optional: Uncomment for persistent chat history (requires Lakebase)
        # - name: database
        #   description: "Lakebase database for chat history"
        #   database:
        #     database_name: databricks_postgres
        #     instance_name: ${resources.database_instances.weatherwise_db.name}
        #     permission: CAN_CONNECT_AND_CREATE

  # Optional: Uncomment for persistent chat history
  # database_instances:
  #   weatherwise_db:
  #     name: weatherwise-lakebase-${var.resource_name_suffix}
  #     capacity: CU_1

targets:
  dev:
    mode: development
    default: true
    variables:
      resource_name_suffix: dev-${workspace.current_user.domain_friendly_name}

  staging:
    mode: production
    variables:
      resource_name_suffix: staging

  prod:
    mode: production
    variables:
      resource_name_suffix: prod
